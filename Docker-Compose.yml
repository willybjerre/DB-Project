services:
  db:
    image: postgres:16
    container_name: weather-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: weather
      POSTGRES_PASSWORD: weatherpass
      POSTGRES_DB: weather_compare
    ports:
      - "5432:5432"
    volumes:
      - weather-pg-data:/var/lib/postgresql/data

volumes:
  weather-pg-data: