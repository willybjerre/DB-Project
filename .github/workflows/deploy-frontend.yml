name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Pages-deployen kræver disse to scopes; contents:read er nok til checkout.
permissions:
  contents: read
  pages: write
  id-token: write

# Lad sidste deploy køre færdig — Pages må ikke have to kørsler i flugt.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      # Frontend er ren static — ingen build, upload mappen som den er.
      - name: Upload frontend as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./frontend

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
